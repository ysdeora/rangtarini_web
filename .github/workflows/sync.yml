name: Sync from rangtarini_web

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write        # ← this is the fix

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Pull from source and push
        run: |
          git remote add source https://github.com/ysdeora/rangtarini_web.git
          git fetch source main
          git reset --hard source/main
          git push origin main --force