name: Sync to rangtarini_webv2

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to target repo
        env:
          TARGET_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          git config --global credential.helper '!f() { echo "username=x-access-token"; echo "password=${TARGET_TOKEN}"; }; f'
          git remote add target https://github.com/ysdeora-rangtarini/rangtarini_webv2.git
          git push target main --force