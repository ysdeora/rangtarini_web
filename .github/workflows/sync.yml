name: Sync to rangtarini_webv2

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # fixes the Node.js warning

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Push to target repo
        run: |
          git remote add target https://x-access-token:${{ secrets.TARGET_REPO_TOKEN }}@github.com/ysdeora-rangtarini/rangtarini_webv2.git
          git push target main --force